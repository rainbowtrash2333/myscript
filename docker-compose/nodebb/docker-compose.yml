# NodeBB + MongoDB
# 启动: docker compose up -d --build
# 停止: docker compose down
# 重置: docker compose down && rm -rf ./data

services:
  mongo:
    image: mongo:7.0
    container_name: nodebb-mongo
    restart: unless-stopped
    environment:
      # mongo 镜像首启动时创建的 root 账号
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE:      ${MONGO_DB:-nodebb}
      # 透传给 mongo-init.sh 用于建业务用户
      MONGO_USER: ${MONGO_USER:-nodebb}
      MONGO_PASS: ${MONGO_PASS}
    volumes:
      - ./data/mongo:/data/db
      - ./mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh:ro
    networks:
      - nodebb-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nodebb:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODEBB_VERSION: ${NODEBB_VERSION:-v4.x}
    image: my-nodebb:local
    container_name: nodebb
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODEBB_URL:  ${NODEBB_URL:-http://localhost:4567}
      NODEBB_PORT: 4567
      MONGO_HOST:  mongo
      MONGO_PORT:  27017
      MONGO_USER:  ${MONGO_USER:-nodebb}
      MONGO_PASS:  ${MONGO_PASS}
      MONGO_DB:    ${MONGO_DB:-nodebb}
      ADMIN_USER:  ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASS:  ${ADMIN_PASS}
    ports:
      - "${NODEBB_HOST_PORT:-4567}:4567"
    volumes:
      # 配置目录 (含 config.json) — 改了重启生效
      - ./data/config:/opt/config
      # 用户上传 (头像、附件)
      - ./data/uploads:/usr/src/app/public/uploads
      # 注: build 与 node_modules 不绑宿主机
      #     绑定空目录会把镜像里的内容遮掉, 导致容器起不来
    networks:
      - nodebb-net

networks:
  nodebb-net:
    driver: bridge
