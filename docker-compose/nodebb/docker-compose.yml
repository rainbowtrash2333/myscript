services:
  nodebb:
    build: .
    restart: unless-stopped
    ports:
      - "${NODEBB_PORT:-4567}:4567"
    volumes:
      - ./nodebb-data:/app/nodebb
    environment:
      - NODE_ENV=production
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-nodebb}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-nodebb}
    volumes:
      - ./mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
